<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@soul1crushbob</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: url(https://lastappfiles.s3.us-west-1.amazonaws.com/apps/31fa57c4-06d2-4312-9818-06d1449e1875/users/4a00b236-9c6a-4486-b98b-9d71fcd045a4/e47c17169e44ad1ef074b38125db09b2-@animangascenery.gif) center/cover fixed;
      overflow-x: hidden;
    }
    .container { max-width: 28rem; margin: 0 auto; min-height: 100vh; padding: 4rem 1rem 6rem; position: relative; }
    .profile { text-align: center; margin-bottom: 2rem; }
    .profile-pic { width: 7rem; height: 7rem; border-radius: 50%; border: 4px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden; margin: 0 auto 1rem; background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); }
    .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
    .username { font-size: 1.5rem; font-weight: bold; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .bio { font-size: 1rem; color: rgba(255,255,255,0.9); margin-top: 0.75rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); max-width: 24rem; margin-left: auto; margin-right: auto; line-height: 1.5; }
    .links { position: relative; width: 100%; height: 50rem; }
    .link-btn { position: absolute; display: flex; align-items: center; justify-content: center; padding: 0 1rem; text-decoration: none; font-weight: 600; transition: transform 0.2s; cursor: pointer; }
    .link-btn:hover { transform: scale(1.05) translateY(-2px); }
    .controls { position: fixed; top: 1rem; right: 1rem; z-index: 50; display: flex; gap: 0.5rem; }
    .control-btn { width: 2.5rem; height: 2.5rem; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .control-btn:hover { background: rgba(0,0,0,0.7); }
    .music-btn { position: fixed; bottom: 1rem; right: 1rem; z-index: 50; width: 3rem; height: 3rem; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .music-btn.playing { background: rgba(59, 130, 246, 0.8); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-pulse { animation: pulse 2s infinite; }
    .animate-bounce { animation: bounce 1s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>
  <div class="controls">
    <button class="control-btn" onclick="navigator.clipboard.writeText(window.location.href).then(() => alert('Link copied!'))">
      <i class="fa fa-share"></i>
    </button>
  </div>
  
  <div class="container">
    <div class="profile">
      <div class="profile-pic">
        <img src="https://lastappfiles.s3.us-west-1.amazonaws.com/apps/31fa57c4-06d2-4312-9818-06d1449e1875/users/4a00b236-9c6a-4486-b98b-9d71fcd045a4/305652404d47d4911fba207142a7a608-tenor_gif 498×291 pixels.gif" alt="soul1crushbob">
      </div>
      <h1 class="username">@soul1crushbob</h1>
      <p class="bio">hello my own bio</p>
    </div>
    <div class="links">
      
        <a href="https://" target="_blank" rel="noopener noreferrer" class="link-btn animate-none" style="left: 48px; top: 0px; width: 280px; height: 60px; background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border-radius: 0px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif; backdrop-filter: blur(12px); ">
          <span style="">youtube</span>
        </a>
      
        <a href="https://" target="_blank" rel="noopener noreferrer" class="link-btn animate-none" style="left: 50px; top: 71px; width: 280px; height: 60px; background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border-radius: 0px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif; backdrop-filter: blur(12px); ">
          <span style="">discord</span>
        </a>
      
    </div>
  </div>
  
</body>
</html>
